name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/web/pnpm-lock.yaml
      - run: corepack enable
      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets
      - uses: rustsec/audit-check@v2
      - name: Install frontend dependencies
        working-directory: apps/desktop/web
        run: pnpm install --frozen-lockfile
      - name: Audit production frontend dependencies
        working-directory: apps/desktop/web
        run: pnpm audit --prod
      - name: Check frontend
        working-directory: apps/desktop/web
        run: pnpm check
      - name: Test frontend
        working-directory: apps/desktop/web
        run: pnpm test
      - name: Build frontend
        working-directory: apps/desktop/web
        run: pnpm build
